spring:
  application:
    name: mocha
  # T0-2 실측용: 로컬 비밀(.env.local, KEY=VALUE)을 프로퍼티 소스로 로드해 ${OPENAI_API_KEY} 등을 바인딩.
  # optional: 파일 없으면 기동 실패 없이 스킵(CI/미설정 프로파일 안전). .env.local은 .gitignore 대상.
  config:
    import: "optional:file:.env.local[.properties]"

# 파일 로깅 (NFR-7, ADR-21 · changes/0009). Spring 표준 logback 설정 — 콘솔과 병행해 logs/ 아래 상시 기록.
# 레벨은 root 기본(INFO 이상 전체 — 에러 앞뒤 맥락 보존). 일 단위 롤링 + 30일 보존 + 총 300MB 상한.
# POLICY: logs/는 개인 데이터 취급 — 사용자 메시지 원문이 남을 수 있어 커밋·공개 금지(.gitignore 유지, 루트 CLAUDE.md §5).
logging:
  file:
    name: logs/mocha.log
  logback:
    rollingpolicy:
      # %d=일 단위 롤링, %i=크기 분할 인덱스(SizeAndTimeBased). .gz로 롤링분 압축.
      file-name-pattern: logs/mocha.%d{yyyy-MM-dd}.%i.log.gz
      max-history: 30
      total-size-cap: 300MB

# 모카 설정 골격 (튜닝 대상, ref: plan.md §5). 코드 default와 별개로 여기서 초기값 명시.
mocha:
  slack:
    # Socket Mode 토큰 2종 (ref: plan.md#ADR-2, tasks T0-1). 비밀이므로 코드/설정에 하드코딩 금지 —
    # 환경변수(.env → .env.local)로 주입. 미설정 시 빈 값 → 소켓 연결을 건너뛰고 컨텍스트만 뜬다(테스트/CI 안전).
    bot-token: ${SLACK_BOT_TOKEN:}
    app-token: ${SLACK_APP_TOKEN:}
  openai:
    # OpenAI API 키(종량제). 비밀이므로 코드/설정에 하드코딩 금지 —
    # 환경변수(.env → .env.local)로 주입. 미설정 시 빈 값 → 실제 호출 시에만 필요(컨텍스트/CI 안전).
    api-key: ${OPENAI_API_KEY:}
  # ── 구 키(llm·search·search-session) — changes/0018 TΔ8b에서 블록째 폐기 예정(ADR-50) ──
  llm:
    # 추출용 경량 모델. 품질 미달 시 상위 모델로 교체(OQ-5).
    model: gpt-4o-mini
    # 구조화 응답 스키마/도메인 위반(V-1) 시 재추출 횟수. 총 시도 = 1 + max-retries.
    max-retries: 1
  search:
    # 웹 검색 보강 전용 모델 — 추출(llm.model)과 분리. 공식 페이지 탐색 능력이 필요해 상위 모델을 쓴다.
    # web_search_preview 도구는 Responses API에서 gpt-4o 계열이 지원. 비용 민감 시 하향 조정.
    model: gpt-4o
    # 보강 검색 상한 — 비용/지연 통제.
    max-results: 3
  # 에이전트 루프·트랜스크립트 (ADR-44/46/50, changes/0018). 상한·TTL은 초기 운영 튜닝 대상이라
  # 설정 키로 승격했다(ADR-50 — 코드 상수 관례의 사용자 확정 예외).
  agent:
    # 에이전트 루프 모델 — web_search 가용·다중 tool 호출 품질 필요. 초기값은 TΔ0a 실측 확정
    # (findings-TΔ0 §3), 품질 부족 관측 시 상위 모델로 교체.
    model: gpt-5.4-mini
    # 턴당 function tool 실행 상한 — 도달 시 결정론 폴백(ADR-48).
    max-tool-calls: 8
    # 작업 트랜스크립트 턴 수 상한·TTL (ADR-46) — 초과분 드롭·경과 시 빈 문맥.
    transcript-max-turns: 20
    transcript-ttl: 1h
  vision:
    # 수신 사진 OCR 전용 경량 모델 (ADR-50 — 구 search.model 공용에서 분리, 전처리에 상위 모델 낭비 금지).
    model: gpt-5.4-mini
    # 수신 사진 OCR(FR-19) 1콜당 이미지 상한 — 초과분은 vision 호출 제외(첨부로만) (ADR-23).
    max-images: 4
  alias:
    # 별칭 생성(ADR-37) 전용 모델 — 텍스트 전용 최경량 (ADR-50).
    model: gpt-5.4-nano
  pending:
    # 확인 대기 노트 TTL. 초과 시 자동 폐기 + 안내 (ADR-3).
    ttl: 24h
  search-session:
    # 검색 세션 TTL (FR-20, ADR-25). 메모리 전용이라 재시작 시엔 TTL 무관 소멸.
    ttl: 1h
    # 세션당 무후보 재질문 상한 (FR-20, ADR-25). 도달 시 종료 안내 + 세션 폐기. 0/미설정 = 무제한.
    max-requery: 0
  photo:
    # 텍스트/사진 분리 수신 그룹핑 윈도우 (FR-10).
    buffer-window: 10m
  data:
    # 노트 JSON·사진·pending 원본 루트 (커밋 금지).
    dir: ./data
  artifact:
    # 산출물(파생물) 루트 — 엔트리 카드 JPG·index HTML (커밋 금지, 전체 재생성 가능).
    dir: ./artifact
    # 노트/인덱스 디자인 테마 (ref: tasks T5-1). type-a=세리프(명조·액자), type-b=귀여운(고딕·카드·마스코트).
    # 값은 templates/<theme>/ 폴더명이자 렌더 선택자다. 기본은 썸네일 카드 인덱스(FR-8)를 갖춘 type-b.
    theme: type-a
  card:
    # 시음 엔트리 카드 이미지(JPG) 뷰포트 (ref: plan.md#ADR-10/ADR-11 §5). 인스타 4:5 = 1080×1350.
    # 비율(4:5) 자체는 상수 — 설정 키로 바꾸지 않는다. width/height는 고해상도 배수 대응용 크기 파라미터일 뿐.
    width: 1080
    height: 1350
    # 카드 JPG 품질(0~1). 파일 크기/화질 균형, Slack 업로드 용량 통제.
    jpg-quality: 0.9
