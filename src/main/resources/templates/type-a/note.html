<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<title th:text="${note.coffeeName.value} + ' · 모카'">커피 노트</title>
<style>
  /* 로컬 번들 폰트(ADR-11) — CDN 미의존, 오프라인·결정적 래스터화. artifact/fonts/는 렌더러가 채운다. */
  @font-face{font-family:'Gowun Batang';src:url('fonts/GowunBatang-Regular.ttf') format('truetype');font-weight:400;font-display:swap}
  @font-face{font-family:'Gowun Batang';src:url('fonts/GowunBatang-Bold.ttf') format('truetype');font-weight:700;font-display:swap}
  html,body{margin:0;padding:0}
  /* 카드 = 인스타 4:5(1080×1350). 뷰포트 스크린샷이 곧 카드다. */
  body{width:1080px;height:1350px;box-sizing:border-box;background:#efe9e2;
       font-family:'Gowun Batang',serif;color:#4a3a2c;display:flex;overflow:hidden}
  .card{flex:1;margin:40px;background:#efe6d8;border-radius:8px;box-shadow:0 8px 34px rgba(43,31,22,.14);
        display:flex;box-sizing:border-box;padding:40px;overflow:hidden}
  .frame{flex:1;border:2px solid #b8a58c;display:flex;flex-direction:column;padding:64px 68px 34px;box-sizing:border-box;background:#f8f3ea;overflow:hidden}
</style>
</head>
<body>
  <div class="card">
    <div class="frame">
      <div style="display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid #d9c9b3;padding-bottom:26px">
        <div style="font-size:22px;letter-spacing:6px;color:#a8896b">COFFEE NOTE</div>
        <div style="font-size:22px;letter-spacing:2px;color:#a8896b" th:text="${fmt.dotted(note.entry.date)}">2026. 7. 10</div>
      </div>

      <div style="padding:44px 0 36px;border-bottom:2px solid #e2d5c3;text-align:center">
        <div style="font-size:26px;color:#8a6f57;margin-bottom:12px" th:if="${note.roastery != null}" th:text="${note.roastery.value}">로스터리</div>
        <!-- 제목=정체성 → coffeeName.value만, 사진 출처여도 태그 안 붙임(delta AC-Δ4·TΔ6) -->
        <div style="font-size:58px;font-weight:700;line-height:1.3;color:#3d2e21" th:text="${note.coffeeName.value}">커피</div>
      </div>

      <!-- 원산지·가공·로스팅 — 7/12 시안: 한 줄 인라인·가운데·`·` 구분. 3필드는 항상 표시(값 없으면 —), 검색값은 ·검색 표기 유지(FR-12) -->
      <div style="display:flex;justify-content:center;align-items:baseline;flex-wrap:wrap;gap:22px;padding:30px 0;border-bottom:2px solid #e2d5c3;text-align:center;font-size:30px;color:#5c4835">
        <span>
          <span style="font-size:22px;color:#b09879;margin-right:12px">원산지</span><span th:text="${note.origin != null ? note.origin.value : '—'}">—</span><span th:if="${note.origin != null and note.origin.source.name() == 'SEARCH'}" style="font-size:22px;color:#b09879"> ·검색</span>
        </span>
        <span style="color:#c9b59a">·</span>
        <span>
          <span style="font-size:22px;color:#b09879;margin-right:12px">가공</span><span th:text="${note.process != null ? note.process.value : '—'}">—</span><span th:if="${note.process != null and note.process.source.name() == 'SEARCH'}" style="font-size:22px;color:#b09879"> ·검색</span>
        </span>
        <span style="color:#c9b59a">·</span>
        <span>
          <span style="font-size:22px;color:#b09879;margin-right:12px">로스팅</span><span th:text="${note.roastLevel != null ? note.roastLevel.value : '—'}">—</span><span th:if="${note.roastLevel != null and note.roastLevel.source.name() == 'SEARCH'}" style="font-size:22px;color:#b09879"> ·검색</span>
        </span>
      </div>

      <!-- FR-18/TΔ6: 추출 레시피(recipe) — 시안: 원산지와 같은 인라인 한 줄. 있는 항목만·전무 시 줄 자체 미출력(AC-Δ2·ADR-22, 사용자 발화 전용) -->
      <div style="display:flex;justify-content:center;align-items:baseline;flex-wrap:wrap;gap:22px;padding:30px 0;border-bottom:2px solid #e2d5c3;text-align:center;font-size:30px;color:#5c4835" th:if="${note.entry.recipe != null}">
        <span th:if="${note.entry.recipe.doseG != null}">
          <span style="font-size:22px;color:#b09879;margin-right:12px">원두</span><span th:text="${amt.num(note.entry.recipe.doseG)} + 'g'">15g</span>
        </span>
        <span style="color:#c9b59a" th:if="${note.entry.recipe.doseG != null and note.entry.recipe.waterMl != null}">·</span>
        <span th:if="${note.entry.recipe.waterMl != null}">
          <span style="font-size:22px;color:#b09879;margin-right:12px">물</span><span th:text="${amt.num(note.entry.recipe.waterMl)} + 'ml'">240ml</span>
        </span>
        <span style="color:#c9b59a" th:if="${(note.entry.recipe.doseG != null or note.entry.recipe.waterMl != null) and note.entry.recipe.grind != null}">·</span>
        <span th:if="${note.entry.recipe.grind != null}">
          <span style="font-size:22px;color:#b09879;margin-right:12px">분쇄도</span><span th:text="${note.entry.recipe.grind}">중간</span>
        </span>
      </div>

      <!-- FR-7: 로스터리가 말하길(official_notes) — 노트 단위 -->
      <div style="padding:34px 0;border-bottom:2px solid #e2d5c3;text-align:center" th:if="${!note.officialNotes.isEmpty()}">
        <div style="font-size:22px;color:#a8896b;margin-bottom:16px">로스터리가 말하길</div>
        <div style="font-size:30px;line-height:1.8;color:#5c4835" th:text="${#strings.listJoin(note.officialNotes, ' · ')}">자몽 · 홍차</div>
      </div>

      <!-- FR-7/AC-Δ4: 내가 느끼길(my_taste) — 대상 엔트리 1건만(노트 전체 타임라인 아님) -->
      <div style="flex:1;min-height:0;padding-top:34px;display:flex;flex-direction:column;gap:24px;overflow:hidden">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <div style="font-size:22px;color:#a8896b">내가 느끼길</div>
          <div th:if="${note.entry.rating != null and note.entry.rating.name() == 'PERFECT'}" style="font-size:22px;color:#f8f3ea;background:#6f5138;border:2px solid #6f5138;border-radius:999px;padding:6px 24px" th:text="${note.entry.rating.label()}">완전 내스타일</div>
          <div th:if="${note.entry.rating != null and note.entry.rating.name() != 'PERFECT'}" style="font-size:22px;color:#8a6f57;border:2px solid #c9b59a;border-radius:999px;padding:6px 24px" th:text="${note.entry.rating.label()}">맛있다</div>
        </div>
        <!-- 사진은 아카이브 전용 — 카드에 렌더하지 않는다(changes/0014, AC-Δ2). myTaste 텍스트만 전폭 -->
        <div style="flex:1;min-height:0;display:flex;gap:40px;align-items:center;overflow:hidden">
          <div style="flex:1;font-size:31px;line-height:2;color:#4a3a2c;white-space:pre-line" th:text="${note.entry.myTaste}">감상</div>
        </div>
      </div>

      <!-- FR-12: 검색 참조 링크(sources) -->
      <div style="padding-top:28px;text-align:center" th:if="${!note.sources.isEmpty()}">
        <div style="font-size:20px;letter-spacing:4px;color:#a8896b;margin-bottom:8px">출처</div>
        <span th:each="src : ${note.sources}" th:text="${src}" style="display:block;font-size:20px;color:#8a6f57;word-break:break-all">링크</span>
      </div>

      <div style="border-top:2px solid #d9c9b3;padding:12px 0 2px 6px;text-align:center;font-size:21px;letter-spacing:6px;color:#c4ad91;margin-top:44px">— 커피 독후감 · 모카 —</div>
    </div>
  </div>
</body>
<!-- POLICY: 카드=엔트리 1건이라 내용은 대체로 4:5(1080×1350)에 담긴다. 극단값(아주 긴 my_taste·사진 다수)은
     my_taste 영역의 overflow:hidden + 뷰포트 스크린샷(fullPage 아님)으로 하드 클램프된다 — 4:5를 넘기지 않는다
     (ref: changes/0002-instagram-share-card delta OQ-Δ1, AC-Δ2/AC-10 "잘림 없음"의 하한 보장). 실데이터 관측으로 조정. -->
</html>
