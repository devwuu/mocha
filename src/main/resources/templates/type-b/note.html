<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title th:text="${note.coffeeName} + ' · 모카'">커피 노트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#efe9e2;font-family:'Gowun Dodum',sans-serif}
  a{color:#6f4e37}a:hover{color:#4a3423}
  .wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;box-sizing:border-box}
  .card{width:460px;height:650px;background:#f6ead9;border-radius:6px;box-shadow:0 2px 12px rgba(43,31,22,.12);display:flex;flex-direction:column;padding:32px 34px 26px;box-sizing:border-box;color:#4d3320}
  .pill{background:#fff;border:1.5px solid #e3c9a4;border-radius:999px;padding:5px 12px;font-size:11.5px;color:#7a5836;white-space:nowrap}
  .searched{color:#c2a276}
  .backlink{margin-top:18px;font-size:12px;color:#8c6a44;text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div style="display:flex;align-items:center;gap:16px">
      <img th:src="${mascotHref}" alt="모카" style="width:68px;height:68px;flex:none;border-radius:50%;object-fit:cover;border:2px solid #e3c9a4;background:#f3e3cc">
      <div>
        <div style="font-size:11px;color:#b08a5c" th:text="'☕ ' + ${fmt.full(note.date)} + '의 커피'">☕ 커피</div>
        <div style="font-size:22px;font-weight:700;color:#3f2a17;line-height:1.35" th:text="${note.coffeeName}">커피</div>
        <div style="font-size:12.5px;color:#8c6a44" th:if="${note.roastery != null}" th:text="${note.roastery.value}">로스터리</div>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin:18px 0 0;flex-wrap:wrap">
      <div class="pill" th:if="${note.origin != null}">
        <span th:text="'🌍 ' + ${note.origin.value}">원산지</span>
        <span class="searched" th:if="${note.origin.source.name() == 'SEARCH'}"> ·검색</span>
      </div>
      <div class="pill" th:if="${note.process != null}">
        <span th:text="'💧 ' + ${note.process.value}">가공</span>
        <span class="searched" th:if="${note.process.source.name() == 'SEARCH'}"> ·검색</span>
      </div>
      <div class="pill" th:if="${note.roastLevel != null}">
        <span th:text="'🔥 ' + ${note.roastLevel.value}">로스팅</span>
        <span class="searched" th:if="${note.roastLevel.source.name() == 'SEARCH'}"> ·검색</span>
      </div>
    </div>

    <div style="margin-top:18px;background:#fff;border-radius:16px;padding:14px 16px;border:1.5px dashed #d9b98c" th:if="${!note.officialNotes.isEmpty()}">
      <div style="font-size:11px;color:#b08a5c;margin-bottom:6px">🏷 로스터리가 말하길</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <span th:each="tag : ${note.officialNotes}" style="background:#f6e7d2;border-radius:8px;padding:4px 9px;font-size:12px" th:text="${tag}">노트</span>
      </div>
    </div>

    <div style="margin-top:16px;flex:1;display:flex;flex-direction:column;gap:12px">
      <div style="font-size:11px;color:#b08a5c">🐾 내가 느끼길</div>
      <div style="flex:1;background:#fff;border-radius:16px;padding:18px 18px;box-shadow:0 2px 0 #e8d3b4;display:flex;flex-direction:column;gap:12px">
        <div style="display:flex;justify-content:flex-end" th:if="${note.rating != null}">
          <div style="border-radius:999px;padding:4px 12px;font-size:11px;white-space:nowrap"
               th:style="'background:' + ${rs.bg(note.rating)} + ';color:' + ${rs.fg(note.rating)}"
               th:text="${note.rating.label()} + ' ' + ${rs.emoji(note.rating)}">평가</div>
        </div>
        <div style="font-size:14.5px;line-height:1.85;flex:1;white-space:pre-line" th:text="${note.myTaste}">감상</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap" th:if="${!note.photos.isEmpty()}">
          <img th:each="photo : ${note.photos}" th:src="${photo}" alt="사진" style="width:120px;height:82px;border-radius:12px;object-fit:cover">
        </div>
      </div>
    </div>
  </div>
  <a class="backlink" th:href="${indexHref}">← 목록으로</a>
</div>
</body>
</html>
