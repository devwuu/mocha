<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<title th:text="${note.coffeeName.value} + ' · 모카'">커피 노트</title>
<style>
  /* 로컬 번들 폰트(ADR-11) — CDN 미의존, 오프라인·결정적 래스터화. artifact/fonts/는 렌더러가 채운다. */
  @font-face{font-family:'Gowun Dodum';src:url('fonts/GowunDodum-Regular.ttf') format('truetype');font-display:swap}
  html,body{margin:0;padding:0}
  /* 카드 = 인스타 4:5(1080×1350). 뷰포트 스크린샷이 곧 카드다 — body가 정확히 4:5를 채운다. */
  body{width:1080px;height:1350px;box-sizing:border-box;background:#efe9e2;
       font-family:'Gowun Dodum',sans-serif;color:#4d3320;display:flex;overflow:hidden}
  .card{flex:1;margin:44px;background:#f6ead9;border-radius:30px;box-shadow:0 8px 34px rgba(43,31,22,.14);
        display:flex;flex-direction:column;padding:66px 70px 58px;box-sizing:border-box;overflow:hidden}
  .pill{background:#fff;border:3px solid #e3c9a4;border-radius:999px;padding:10px 24px;font-size:25px;color:#7a5836;white-space:nowrap}
  .searched{color:#c2a276}
  /* my_taste 엔트리 1건 — 넘치면 뷰포트에서 클램프된다(POLICY 아래). */
  .entry{background:#fff;border-radius:34px;padding:36px 40px;box-shadow:0 5px 0 #e8d3b4;display:flex;flex-direction:column;gap:24px;overflow:hidden}
</style>
</head>
<body>
  <div class="card">
    <div style="display:flex;align-items:center;gap:34px">
      <img th:src="${mascotHref}" alt="모카" style="width:150px;height:150px;flex:none;border-radius:50%;object-fit:cover;border:4px solid #e3c9a4;background:#f3e3cc">
      <div>
        <!-- 시안: 헤더에 엔트리 날짜 포함(☕ 2026년 7월 10일의 커피) -->
        <div style="font-size:24px;color:#b08a5c" th:text="'☕ ' + ${fmt.full(note.entry.date)} + '의 커피'">☕ 오늘의 커피</div>
        <!-- 제목=정체성 → coffeeName.value만, 사진 출처여도 태그 안 붙임(delta AC-Δ4·TΔ6) -->
        <div style="font-size:48px;font-weight:700;color:#3f2a17;line-height:1.3" th:text="${note.coffeeName.value}">커피</div>
        <div style="font-size:27px;color:#8c6a44" th:if="${note.roastery != null}" th:text="${note.roastery.value}">로스터리</div>
      </div>
    </div>

    <div style="display:flex;gap:16px;margin:38px 0 0;flex-wrap:wrap">
      <div class="pill" th:if="${note.origin != null}">
        <span th:text="'🌍 ' + ${note.origin.value}">원산지</span>
        <span class="searched" th:if="${note.origin.source.name() == 'SEARCH'}"> ·검색</span>
      </div>
      <div class="pill" th:if="${note.process != null}">
        <span th:text="'💧 ' + ${note.process.value}">가공</span>
        <span class="searched" th:if="${note.process.source.name() == 'SEARCH'}"> ·검색</span>
      </div>
      <div class="pill" th:if="${note.roastLevel != null}">
        <span th:text="'🔥 ' + ${note.roastLevel.value}">로스팅</span>
        <span class="searched" th:if="${note.roastLevel.source.name() == 'SEARCH'}"> ·검색</span>
      </div>
    </div>

    <!-- FR-7: 로스터리가 말하길(official_notes) — 노트 단위 -->
    <div style="margin-top:36px;background:#fff;border-radius:32px;padding:28px 32px;border:3px dashed #d9b98c" th:if="${!note.officialNotes.isEmpty()}">
      <div style="font-size:23px;color:#b08a5c;margin-bottom:12px">🏷 로스터리가 말하길</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <span th:each="tag : ${note.officialNotes}" style="background:#f6e7d2;border-radius:14px;padding:8px 18px;font-size:25px" th:text="${tag}">노트</span>
      </div>
    </div>

    <!-- FR-18/TΔ6: 추출 레시피(recipe) — 로스터리가 말하길 아래·내가 느끼길 위. 있는 항목만·전무 시 블록 자체 미출력(AC-Δ2·ADR-22, 사용자 발화 전용) -->
    <div style="margin-top:34px;display:flex;flex-direction:column;gap:18px" th:if="${note.entry.recipe != null}">
      <div style="font-size:24px;color:#b08a5c">💧 이렇게 내렸어요</div>
      <div style="background:#fff;border-radius:32px;padding:24px 28px;box-shadow:0 5px 0 #e8d3b4;display:flex;gap:16px;text-align:center">
        <div style="flex:1;background:#f6e7d2;border-radius:22px;padding:18px 10px" th:if="${note.entry.recipe.doseG != null}">
          <div style="font-size:22px;color:#b08a5c;margin-bottom:6px">원두</div>
          <div style="font-size:30px;font-weight:700;color:#3f2a17" th:text="${amt.num(note.entry.recipe.doseG)} + 'g'">15g</div>
        </div>
        <div style="flex:1;background:#f6e7d2;border-radius:22px;padding:18px 10px" th:if="${note.entry.recipe.waterMl != null}">
          <div style="font-size:22px;color:#b08a5c;margin-bottom:6px">물</div>
          <div style="font-size:30px;font-weight:700;color:#3f2a17" th:text="${amt.num(note.entry.recipe.waterMl)} + 'ml'">240ml</div>
        </div>
        <div style="flex:1;background:#f6e7d2;border-radius:22px;padding:18px 10px" th:if="${note.entry.recipe.grind != null}">
          <div style="font-size:22px;color:#b08a5c;margin-bottom:6px">분쇄도</div>
          <div style="font-size:30px;font-weight:700;color:#3f2a17" th:text="${note.entry.recipe.grind}">중간</div>
        </div>
      </div>
    </div>

    <!-- FR-7/AC-Δ4: 내가 느끼길(my_taste) — 대상 엔트리 1건만(노트 전체 타임라인 아님) -->
    <div style="margin-top:34px;flex:1;min-height:0;display:flex;flex-direction:column;gap:22px;overflow:hidden">
      <div style="font-size:24px;color:#b08a5c">🐾 내가 느끼길</div>
      <div class="entry">
        <!-- 시안: 날짜는 상단 헤더로 옮겨 엔트리 box엔 rating만 우측 -->
        <div style="display:flex;justify-content:flex-end" th:if="${note.entry.rating != null}">
          <div style="border-radius:999px;padding:9px 24px;font-size:23px;white-space:nowrap"
               th:style="'background:' + ${rs.bg(note.entry.rating)} + ';color:' + ${rs.fg(note.entry.rating)}"
               th:text="${note.entry.rating.label()} + ' ' + ${rs.emoji(note.entry.rating)}">평가</div>
        </div>
        <!-- 사진은 아카이브 전용 — 카드에 렌더하지 않는다(changes/0014, AC-Δ2). -->
        <div style="font-size:30px;line-height:1.8;white-space:pre-line" th:text="${note.entry.myTaste}">감상</div>
      </div>
    </div>

    <!-- FR-12: 검색 참조 링크(sources) -->
    <div style="margin-top:34px" th:if="${!note.sources.isEmpty()}">
      <div style="font-size:23px;color:#b08a5c;margin-bottom:8px">🔗 출처</div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <span th:each="src : ${note.sources}" th:text="${src}" style="font-size:21px;color:#8c6a44;word-break:break-all">링크</span>
      </div>
    </div>
  </div>
</body>
<!-- POLICY: 카드=엔트리 1건이라 내용은 대체로 4:5(1080×1350)에 담긴다. 극단값(아주 긴 my_taste·사진 다수)은
     .entry/my_taste 영역의 overflow:hidden + 뷰포트 스크린샷(fullPage 아님)으로 하드 클램프된다 — 4:5를 넘기지 않는다
     (ref: changes/0002-instagram-share-card delta OQ-Δ1, AC-Δ2/AC-10 "잘림 없음"의 하한 보장). 실데이터 관측으로 조정. -->
</html>
