<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<title th:text="${card.coffeeName} + ' · 모카'">커피 노트</title>
<style>
  /* 로컬 번들 폰트(ADR-11, ADR-54 편차②) — 시안의 Google Fonts CDN 대체. artifact/fonts/는 렌더러가 채운다. */
  @font-face{font-family:'Gowun Dodum';src:url('fonts/GowunDodum-Regular.ttf') format('truetype');font-display:swap}
  html,body{margin:0;padding:0}
  /* 카드 = 4:5(1080×1350) 뷰포트 스크린샷. 시안 실측 460×575(동일 4:5)를 치수 무환산으로 이식하고
     스케일 래퍼(×1080/460)로 실 규격을 채운다 — 시안이 디자인 원본이라 환산 전사 오류를 없앤다(ADR-54).
     autofit 측정은 레이아웃 좌표라 하한도 시안 값(10.5) 그대로다. */
  body{width:1080px;height:1350px;overflow:hidden;background:#efe9e2}
  .scale{width:460px;height:575px;transform:scale(2.3478260870);transform-origin:top left}
</style>
</head>
<body>
<div class="scale">
<div style="width:460px;height:575px;background:#f6ead9;border-radius:6px;box-shadow:0 2px 12px rgba(43,31,22,.12);display:flex;flex-direction:column;padding:22px 26px 16px;box-sizing:border-box;font-family:'Gowun Dodum',sans-serif;color:#4d3320">
  <div style="display:flex;align-items:center;gap:13px">
    <!-- ADR-54 편차④: 마스코트는 클래스패스 번들 → artifact 루트 복사본을 상대 참조 -->
    <img th:src="${mascotHref}" alt="모카" style="width:52px;height:52px;flex:none;border-radius:50%;object-fit:cover;border:2px solid #e3c9a4;background:#f3e3cc">
    <div>
      <div style="font-size:10.5px;color:#b08a5c" th:text="${fmt.full(card.date)} + '의 커피'">2026년 7월 10일의 커피</div>
      <div style="font-size:19px;font-weight:700;color:#3f2a17;line-height:1.35" th:text="${card.coffeeName}">봄맞이 블렌드</div>
      <div style="font-size:11.5px;color:#8c6a44" th:if="${card.roastery != null}" th:text="${card.roastery}">커피베라</div>
    </div>
    <!-- FR-7 ⑥ rating 뱃지 — 이모티콘 없는 텍스트(ADR-54 편차①), 색은 RatingStyle 4범주 계열, 없으면 생략 -->
    <!-- th:style은 정적 style을 대체하므로 색만 th:styleappend로 덧붙인다(pill 형태·우측 정렬 보존) -->
    <div style="margin-left:auto;align-self:flex-start;border-radius:999px;padding:3px 11px;font-size:10.5px;white-space:nowrap"
         th:if="${card.rating != null}"
         th:styleappend="'background:' + ${rs.bg(card.rating)} + ';color:' + ${rs.fg(card.rating)} + ';border:1.5px solid ' + ${rs.border(card.rating)}"
         th:text="${card.rating.label()}">맛있다</div>
  </div>
  <!-- FR-7 ③④: beans 원두별 행(설명 좌·가공방식 우) + roast_level 우상단. 값 없는 행·영역은 숨긴다(구 AC-25 규칙 승계). -->
  <div style="margin-top:12px;background:#fff;border-radius:14px;padding:11px 14px;box-shadow:0 2px 0 #e8d3b4" th:if="${!card.beans.isEmpty()}">
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:7px">
      <div style="display:flex;align-items:center;gap:6px"><span style="width:7px;height:7px;border-radius:50%;background:#d9b98c"></span><span style="font-size:10.5px;color:#b08a5c">이런 원두예요</span></div>
      <div style="font-size:10.5px;color:#a3854f" th:if="${card.roastLevel != null}" th:text="${card.roastLevel} + ' 로스팅'">라이트 로스팅</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;font-size:12px;color:#5c4529;line-height:1.5">
      <div style="display:flex;align-items:baseline;justify-content:space-between;gap:10px" th:each="b : ${card.beans}"><span th:text="${b.description}">에티오피아 예가체프 헤어룸</span><span style="flex:none;font-size:10.5px;color:#a3854f" th:if="${b.process != null}" th:text="${b.process}">워시드</span></div>
    </div>
  </div>
  <!-- FR-7 ⑤: official_notes 태그 칩 -->
  <div style="margin-top:10px;background:#fff;border-radius:14px;padding:10px 14px;border:1.5px dashed #d9b98c" th:if="${!card.officialNotes.isEmpty()}">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="width:7px;height:7px;border-radius:50%;background:#d9b98c"></span><span style="font-size:10.5px;color:#b08a5c">로스터리가 말하길</span></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <span style="background:#f6e7d2;border-radius:8px;padding:3px 9px;font-size:11.5px;white-space:nowrap" th:each="n : ${card.officialNotes}" th:text="${n}">자몽</span>
    </div>
  </div>
  <!-- FR-7 ⑥: 그 회차의 my_taste(autofit — FR-13). white-space:pre-line — 감상의 줄바꿈 보존(데이터 충실). -->
  <div style="margin-top:10px;flex:1;display:flex;flex-direction:column;gap:7px;min-height:0">
    <div style="display:flex;align-items:center;gap:6px"><span style="width:7px;height:7px;border-radius:50%;background:#d9b98c"></span><span style="font-size:10.5px;color:#b08a5c">내가 느끼길</span></div>
    <div style="flex:1;background:#fff;border-radius:14px;padding:12px 15px;box-shadow:0 2px 0 #e8d3b4;min-height:0;overflow:hidden;display:flex">
      <div data-autofit="10.5" style="flex:1;min-height:0;overflow:hidden;font-size:13px;line-height:1.8;white-space:pre-line" th:text="${card.myTaste}">감상</div>
    </div>
  </div>
</div>
</div>
<script>
/* 시안 autofit 이식(ADR-54 — 감상 영역만, 하한 = data-autofit 값). 정적 1회 렌더라 시안의
   MutationObserver·resize 트리거는 제외하고 즉시 1회 + fonts.ready 재실행으로 단순화했다.
   완료(data-autofit-done)·하한 도달(data-autofit-floor) 마커는 래스터화 대기·로깅 배선(TΔ5a, plan §6)의 입력. */
(function(){
  function fit(el){
    if(!el.dataset.fitBase)el.dataset.fitBase=getComputedStyle(el).fontSize;
    el.style.fontSize=el.dataset.fitBase;
    el.removeAttribute('data-autofit-floor');
    var s=parseFloat(el.dataset.fitBase);
    var min=parseFloat(el.getAttribute('data-autofit'))||10;
    while(s>min && el.scrollHeight>el.clientHeight+1){s-=.5;el.style.fontSize=s+'px';}
    if(el.scrollHeight>el.clientHeight+1)el.setAttribute('data-autofit-floor','');
  }
  function all(){document.querySelectorAll('[data-autofit]').forEach(fit);}
  all();
  function done(){document.documentElement.setAttribute('data-autofit-done','');}
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(function(){all();done();});}
  else{done();}
})();
</script>
</body>
</html>
