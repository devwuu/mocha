<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>커피 노트 · 모카</title>
<style>
  /* 로컬 번들 폰트(ADR-11) — CDN 미의존. 로컬 열람 시에도 네트워크 없이 표시. artifact/fonts/는 렌더러가 채운다. */
  @font-face{font-family:'Gowun Dodum';src:url('fonts/GowunDodum-Regular.ttf') format('truetype');font-display:swap}
  body{margin:0;background:#efe9e2;font-family:'Gowun Dodum',sans-serif}
  a{color:#6f4e37}a:hover{color:#4a3423}
  .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;box-sizing:border-box}
  .card{width:460px;min-height:650px;background:#f6ead9;border-radius:6px;box-shadow:0 2px 12px rgba(43,31,22,.12);display:flex;flex-direction:column;padding:32px 34px 26px;box-sizing:border-box;color:#4d3320}
  .thumb{width:46px;height:46px;flex:none;border-radius:12px;object-fit:cover;background:repeating-linear-gradient(45deg,#f3e6d2,#f3e6d2 6px,#ecdcc2 6px,#ecdcc2 12px)}
  .row{text-decoration:none;color:inherit;background:#fff;border-radius:16px;padding:14px 16px;box-shadow:0 2px 0 #e8d3b4;display:flex;align-items:center;gap:13px}
  .empty{margin-top:40px;text-align:center;font-size:13px;color:#8c6a44}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div style="display:flex;align-items:center;gap:14px">
      <img th:src="${mascotHref}" alt="모카" style="width:56px;height:56px;flex:none;border-radius:50%;object-fit:cover;border:2px solid #e3c9a4;background:#f3e3cc">
      <div>
        <div style="font-size:22px;font-weight:700;color:#3f2a17;line-height:1.3">커피 노트</div>
        <div style="font-size:12px;color:#8c6a44" th:text="'지금까지 마신 원두 ' + ${index.noteCount} + '개 · 기록 ' + ${index.recordCount} + '번'">원두 0개</div>
      </div>
    </div>

    <div style="margin-top:20px;flex:1;display:flex;flex-direction:column;gap:11px">
      <a th:each="row : ${index.rows}" class="row" th:href="${row.href}">
        <img class="thumb" th:if="${row.thumb != null}" th:src="${row.thumb}" alt="사진">
        <div class="thumb" th:if="${row.thumb == null}"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14.5px;font-weight:700;color:#3f2a17" th:text="${row.coffeeName}">커피</div>
          <div style="font-size:11.5px;color:#8c6a44;margin-top:3px"
               th:text="(${row.roastery} != null ? ${row.roastery} + ' · ' : '') + ${fmt.monthDay(row.date)}">로스터리 · 날짜</div>
        </div>
        <div th:if="${row.rating != null}" style="flex:none;border-radius:999px;padding:3px 10px;font-size:10.5px;white-space:nowrap"
             th:style="'background:' + ${rs.bg(row.rating)} + ';color:' + ${rs.fg(row.rating)}"
             th:text="${row.rating.label()} + ' ' + ${rs.emoji(row.rating)}">평가</div>
      </a>
      <div class="empty" th:if="${index.rows.isEmpty()}">아직 기록이 없어요 멍… 첫 커피를 들려주세요 🐾</div>
    </div>
  </div>
</div>
</body>
</html>
