<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<title th:text="${card.coffeeName} + ' · 모카'">커피 레시피</title>
<style>
  /* 로컬 번들 폰트(ADR-11, ADR-54 편차②) — 시안의 Google Fonts CDN 대체. artifact/fonts/는 렌더러가 채운다. */
  @font-face{font-family:'Gowun Dodum';src:url('fonts/GowunDodum-Regular.ttf') format('truetype');font-display:swap}
  html,body{margin:0;padding:0}
  /* 카드 = 4:5(1080×1350) 뷰포트 스크린샷. 시안 실측 460×575(동일 4:5)를 치수 무환산으로 이식하고
     스케일 래퍼(×1080/460)로 실 규격을 채운다 — 시안이 디자인 원본이라 환산 전사 오류를 없앤다(ADR-54).
     autofit 측정은 레이아웃 좌표라 하한도 시안 값(10.5) 그대로다. */
  body{width:1080px;height:1350px;overflow:hidden;background:#efe9e2}
  .scale{width:460px;height:575px;transform:scale(2.3478260870);transform-origin:top left}
  /* 시안의 고정 grid 열은 타일이 조건부라 flex로 이식 — 값 없는 타일이 빠져도 배치가 성립. */
  .tiles{display:flex;gap:8px;text-align:center}
  .tile{flex:1;background:#f6e7d2;border-radius:10px;padding:10px 4px}
  .row{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
</style>
</head>
<body>
<div class="scale">
<div style="width:460px;height:575px;background:#f6ead9;border-radius:6px;box-shadow:0 2px 12px rgba(43,31,22,.12);display:flex;flex-direction:column;padding:22px 26px 16px;box-sizing:border-box;font-family:'Gowun Dodum',sans-serif;color:#4d3320">
  <div style="display:flex;align-items:center;gap:13px">
    <!--/* ADR-54 편차④: 마스코트는 클래스패스 번들 → artifact 루트 복사본을 상대 참조 */-->
    <img th:src="${mascotHref}" alt="모카" style="width:52px;height:52px;flex:none;border-radius:50%;object-fit:cover;border:2px solid #e3c9a4;background:#f3e3cc">
    <div>
      <div style="font-size:10.5px;color:#b08a5c"
           th:text="${card.roastery != null ? card.coffeeName + ' · ' + card.roastery : card.coffeeName}">봄맞이 블렌드 · 커피베라</div>
      <div style="font-size:19px;font-weight:700;color:#3f2a17;line-height:1.35">이렇게 내렸어요</div>
      <div style="font-size:11.5px;color:#8c6a44" th:text="${fmt.full(card.date)}">2026년 7월 10일</div>
    </div>
    <!--/* FR-7 ②: 방식 뱃지(method 그대로, 없으면 생략) */-->
    <div style="margin-left:auto;align-self:flex-start;background:#f0e0cd;border:1.5px solid #e3c9a4;color:#7a5836;border-radius:999px;padding:3px 11px;font-size:10.5px;white-space:nowrap"
         th:if="${card.recipe.method != null}" th:text="${card.recipe.method}">핸드드립</div>
  </div>
  <!--/* FR-7 ③ 수치 그리드(타일) — 변형은 espressoLayout 분기(NoteView.RecipeCard POLICY), 값 있는 항목만(구 AC-25 승계).
       비율·시간은 렌더 계산 파생 표기(ADR-54), 추출량은 yield_ml 기준 ml 표기(시안 "36g"은 예시 데이터 — 편차③). */-->
  <div style="margin-top:12px;background:#fff;border-radius:14px;padding:12px 14px;box-shadow:0 2px 0 #e8d3b4" th:if="${card.hasNumericTiles()}">
    <div class="tiles">
      <th:block th:unless="${card.espressoLayout()}">
        <div class="tile" th:if="${card.recipe.doseG != null}">
          <div style="font-size:10px;color:#b08a5c;margin-bottom:3px">원두</div>
          <div style="font-size:17px;font-weight:700;color:#3f2a17" th:text="${amt.num(card.recipe.doseG)} + 'g'">15g</div>
        </div>
        <div class="tile" th:if="${card.recipe.waterMl != null}">
          <div style="font-size:10px;color:#b08a5c;margin-bottom:3px">물</div>
          <div style="font-size:17px;font-weight:700;color:#3f2a17" th:text="${amt.num(card.recipe.waterMl)} + 'ml'">240ml</div>
        </div>
        <div class="tile" style="flex:1.4" th:if="${card.recipe.grind != null}">
          <div style="font-size:10px;color:#b08a5c;margin-bottom:3px">분쇄도</div>
          <div style="font-size:17px;font-weight:700;color:#3f2a17" th:text="${amt.grindValue(card.recipe.grind)}">210클릭</div>
          <div style="font-size:9.5px;color:#a3854f;margin-top:1px" th:if="${amt.grindGrinder(card.recipe.grind) != null}"
               th:text="${amt.grindGrinder(card.recipe.grind)} + ' 기준'">매버릭 2.0 기준</div>
        </div>
      </th:block>
      <th:block th:if="${card.espressoLayout()}">
        <div class="tile" th:if="${card.recipe.doseG != null}">
          <div style="font-size:10px;color:#b08a5c;margin-bottom:3px">도징</div>
          <div style="font-size:17px;font-weight:700;color:#3f2a17" th:text="${amt.num(card.recipe.doseG)} + 'g'">18g</div>
        </div>
        <div class="tile" style="flex:1.2" th:if="${card.recipe.yieldMl != null}">
          <div style="font-size:10px;color:#b08a5c;margin-bottom:3px">추출량</div>
          <div style="font-size:17px;font-weight:700;color:#3f2a17" th:text="${amt.num(card.recipe.yieldMl)} + 'ml'">36ml</div>
          <div style="font-size:9.5px;color:#a3854f;margin-top:1px" th:if="${amt.ratio(card.recipe.doseG, card.recipe.yieldMl) != null}"
               th:text="'비율 ' + ${amt.ratio(card.recipe.doseG, card.recipe.yieldMl)}">비율 1 : 2</div>
        </div>
        <!--/* 시간 가드는 표기 결과(amt.time) 기준 — 반올림 0초 등 표기 불가 값의 빈 타일 누수 차단(changes/0025 리뷰 후속). */-->
        <div class="tile" th:if="${amt.time(card.recipe.timeSec) != null}">
          <div style="font-size:10px;color:#b08a5c;margin-bottom:3px">추출 시간</div>
          <div style="font-size:17px;font-weight:700;color:#3f2a17" th:text="${amt.time(card.recipe.timeSec)}">28초</div>
        </div>
      </th:block>
    </div>
  </div>
  <!--/* FR-7 ③ 상세 행 — 타일에 못 오른 값 있는 항목만. 시안의 뜸/푸어링 행 분해는 데이터(pouring 자유 문자열 1개)와
       어긋나 푸어링 한 행 + 총 추출 시간 행으로 정합화(findings-TΔ0 §5.3). */-->
  <div style="margin-top:10px;background:#fff;border-radius:14px;padding:11px 14px;box-shadow:0 2px 0 #e8d3b4" th:if="${card.hasDetailRows()}">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:7px"><span style="width:7px;height:7px;border-radius:50%;background:#d9b98c"></span><span
         style="font-size:10.5px;color:#b08a5c" th:text="${card.espressoLayout()} ? '이렇게 세팅했어요' : '이 순서로 부었어요'">이 순서로 부었어요</span></div>
    <div style="display:flex;flex-direction:column;gap:5px;font-size:12px;color:#5c4529;line-height:1.5">
      <th:block th:unless="${card.espressoLayout()}">
        <div class="row" th:if="${card.recipe.tempC != null}"><span>물온도</span><span style="font-weight:700;color:#3f2a17" th:text="${amt.num(card.recipe.tempC)} + '℃'">92℃</span></div>
        <div class="row" th:if="${card.recipe.machine != null}"><span>머신</span><span style="font-weight:700;color:#3f2a17" th:text="${card.recipe.machine}">기구</span></div>
        <div class="row" th:if="${card.recipe.yieldMl != null}"><span>추출량</span><span style="font-weight:700;color:#3f2a17"><span th:text="${amt.num(card.recipe.yieldMl)} + 'ml'">36ml</span> <span
             style="font-weight:400;font-size:10.5px;color:#a3854f" th:if="${amt.ratio(card.recipe.doseG, card.recipe.yieldMl) != null}"
             th:text="'비율 ' + ${amt.ratio(card.recipe.doseG, card.recipe.yieldMl)}">비율 1 : 2</span></span></div>
        <div class="row" th:if="${card.recipe.pouring != null}"><span>푸어링</span><span style="font-weight:700;color:#3f2a17;text-align:right" th:text="${card.recipe.pouring}">100ml + 100ml</span></div>
        <div class="row" th:if="${amt.time(card.recipe.timeSec) != null}"><span>총 추출 시간</span><span style="font-weight:700;color:#3f2a17" th:text="${amt.time(card.recipe.timeSec)}">2분 40초</span></div>
      </th:block>
      <th:block th:if="${card.espressoLayout()}">
        <div class="row" th:if="${card.recipe.grind != null}"><span>분쇄도</span><span style="font-weight:700;color:#3f2a17"><span th:text="${amt.grindValue(card.recipe.grind)}">90클릭</span> <span
             style="font-weight:400;font-size:10.5px;color:#a3854f" th:if="${amt.grindGrinder(card.recipe.grind) != null}"
             th:text="${amt.grindGrinder(card.recipe.grind)} + ' 기준'">매버릭 2.0 기준</span></span></div>
        <div class="row" th:if="${card.recipe.machine != null}"><span>머신</span><span style="font-weight:700;color:#3f2a17" th:text="${card.recipe.machine}">게이지아 클래식</span></div>
        <div class="row" th:if="${card.recipe.tempC != null}"><span>추출 온도</span><span style="font-weight:700;color:#3f2a17" th:text="${amt.num(card.recipe.tempC)} + '℃'">93℃</span></div>
        <div class="row" th:if="${card.recipe.waterMl != null}"><span>물</span><span style="font-weight:700;color:#3f2a17" th:text="${amt.num(card.recipe.waterMl)} + 'ml'">43ml</span></div>
        <div class="row" th:if="${card.recipe.pouring != null}"><span>푸어링</span><span style="font-weight:700;color:#3f2a17;text-align:right" th:text="${card.recipe.pouring}">과정</span></div>
      </th:block>
    </div>
  </div>
  <!--/* FR-7 ④: 레시피 피드백(autofit — FR-13). 없으면 내용만 숨기고 골격은 유지한다. */-->
  <div style="margin-top:10px;flex:1;display:flex;flex-direction:column;gap:7px;min-height:0">
    <div style="display:flex;align-items:center;gap:6px" th:if="${card.recipe.feedback != null}"><span style="width:7px;height:7px;border-radius:50%;background:#d9b98c"></span><span style="font-size:10.5px;color:#b08a5c">다음엔 이렇게 내려볼래요</span></div>
    <div style="flex:1;background:#fff;border-radius:14px;padding:12px 15px;border:1.5px dashed #d9b98c;min-height:0;overflow:hidden;display:flex" th:if="${card.recipe.feedback != null}">
      <!--/* white-space:pre-line — 피드백의 줄바꿈 보존(데이터 충실 — 시안 예시는 단문이라 무영향) */-->
      <div data-autofit="10.5" style="flex:1;min-height:0;overflow:hidden;font-size:13px;line-height:1.8;white-space:pre-line" th:text="${card.recipe.feedback}">피드백</div>
    </div>
  </div>
</div>
</div>
<script>
/* 시안 autofit 이식(ADR-54 — 피드백 영역만, 하한 = data-autofit 값). 정적 1회 렌더라 시안의
   MutationObserver·resize 트리거는 제외하고 즉시 1회 + fonts.ready 재실행으로 단순화했다.
   완료(data-autofit-done)·하한 도달(data-autofit-floor) 마커는 래스터화 대기·로깅 배선(TΔ5a, plan §6)의 입력. */
(function(){
  function fit(el){
    if(!el.dataset.fitBase)el.dataset.fitBase=getComputedStyle(el).fontSize;
    el.style.fontSize=el.dataset.fitBase;
    el.removeAttribute('data-autofit-floor');
    var s=parseFloat(el.dataset.fitBase);
    var min=parseFloat(el.getAttribute('data-autofit'))||10;
    while(s>min && el.scrollHeight>el.clientHeight+1){s-=.5;el.style.fontSize=s+'px';}
    if(el.scrollHeight>el.clientHeight+1)el.setAttribute('data-autofit-floor','');
  }
  function all(){document.querySelectorAll('[data-autofit]').forEach(fit);}
  all();
  function done(){document.documentElement.setAttribute('data-autofit-done','');}
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(function(){all();done();});}
  else{done();}
})();
</script>
</body>
</html>
